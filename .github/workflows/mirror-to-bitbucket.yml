name: Mirror to Bitbucket

# Makes the Bitbucket repo an exact replica of this GitHub repo.
# Runs on every push, tag, and branch/tag deletion, plus manual dispatch.
# Because it uses `git push --mirror`, any branch or tag that exists on
# Bitbucket but NOT on GitHub will be DELETED on Bitbucket.

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:               # propagate branch/tag deletions
  workflow_dispatch:    # allow manual runs from the Actions tab

concurrency:
  group: mirror-to-bitbucket
  cancel-in-progress: false   # never interrupt a mirror mid-push

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitHub -> Bitbucket
        env:
          GH_TOKEN: ${{ github.token }}
          # Bitbucket Repository Access Token (username is the fixed literal
          # "x-token-auth", which is not sensitive and is hardcoded below).
          BITBUCKET_SYNC: ${{ secrets.BITBUCKET_SYNC }}
        run: |
          set -euo pipefail
          git clone --mirror \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo.git
          cd repo.git
          # Pass the credential as a Basic-auth header rather than in the URL,
          # so any special characters in the token are tolerated. Strip stray
          # whitespace/newlines from the secret first.
          TOKEN="$(printf '%s' "$BITBUCKET_SYNC" | tr -d '[:space:]')"
          AUTH="$(printf 'x-token-auth:%s' "$TOKEN" | base64 | tr -d '\n')"
          git -c http."https://bitbucket.org/".extraheader="Authorization: Basic ${AUTH}" \
            push --mirror "https://bitbucket.org/dsenechQCM/qcm_wed.git"
